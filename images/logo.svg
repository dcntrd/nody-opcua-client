<svg width="256" height="256" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" fill="none">

  <!-- Outer hexagon -->
  <polygon points="32,6 54,18 54,46 32,58 10,46 10,18" stroke="#2563EB" stroke-width="3" stroke-linejoin="round"></polygon>

  <!-- Internal connections -->
  <line x1="22" y1="24" x2="42" y2="24" stroke="#06B6D4" stroke-width="2.5" stroke-linecap="round"></line>

  <line x1="22" y1="24" x2="32" y2="42" stroke="#06B6D4" stroke-width="2.5" stroke-linecap="round"></line>

  <line x1="42" y1="24" x2="32" y2="42" stroke="#06B6D4" stroke-width="2.5" stroke-linecap="round"></line>

  <!-- Nodes -->
  <!-- upper-left (same as outline) -->
  <circle cx="22" cy="24" r="4.2" fill="#2563EB"></circle>

  <!-- upper-right (same as bottom) -->
  <circle cx="42" cy="24" r="3.4" fill="#0EA5E9"></circle>

  <!-- bottom -->
  <circle cx="32" cy="42" r="3.6" fill="#0EA5E9"></circle>

</svg>